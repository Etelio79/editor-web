name: Scrape Eventos

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
  workflow_dispatch:          # permite correrlo a mano

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr scraper
        env:
          API_URL: https://sportstream-api-production.up.railway.app
        run: node scripts/scrape.js

      - name: Guardar eventos.json
        run: |
          git config user.name  "SportStream Bot"
          git config user.email "bot@sportstream.app"
          git add eventos.json
          git diff --staged --quiet || git commit -m "eventos: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
