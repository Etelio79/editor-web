name: Scrape Eventos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Chromium y Puppeteer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium
          npm install puppeteer-core

      - name: Correr scraper
        env:
          PUPPETEER_EXEC: /usr/bin/chromium
          SITE_URL: https://futbollibre.ec
          API_URL: https://sportstream-api-production.up.railway.app
        run: node scripts/scrape.js

      - name: Guardar eventos.json
        run: |
          git config user.name  "SportStream Bot"
          git config user.email "bot@sportstream.app"
          git add eventos.json
          git diff --staged --quiet || git commit -m "eventos: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
